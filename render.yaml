services:
  # Xeno Redis
  - type: redis
    name: xeno-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

  # Xeno Backend
  - type: web
    name: xeno-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: xeno-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: xeno-redis
          property: connectionString
      - key: CHANNEL_SERVICE_URL
        fromService:
          type: web
          name: xeno-channel-service
          property: host

  # Xeno Channel Stub Service
  - type: web
    name: xeno-channel-service
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: channel-service
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: xeno-redis
          property: connectionString
      - key: CRM_CALLBACK_URL
        fromService:
          type: web
          name: xeno-backend
          property: host

  # Xeno Frontend (Static Site)
  - type: web
    name: xeno-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: xeno-backend
          property: host

databases:
  - name: xeno-db
    plan: free
    databaseName: xenocrm
