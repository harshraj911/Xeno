services:
  # Xeno Redis
  - type: redis
    name: xeno-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

  # Xeno Backend
  - type: web
    name: xeno-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/index.js
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: xeno-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: xeno-redis
          property: connectionString
      - key: CHANNEL_SERVICE_URL
        fromService:
          type: web
          name: xeno-channel-service
          property: hostport
      - key: GROQ_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: JWT_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: '*'

  # Xeno Channel Stub Service
  - type: web
    name: xeno-channel-service
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: channel-service
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: xeno-redis
          property: connectionString
      - key: CRM_CALLBACK_URL
        fromService:
          type: web
          name: xeno-backend
          property: hostport

  # Xeno Frontend (Static Site)
  - type: web
    name: xeno-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: xeno-backend
          property: host

databases:
  - name: xeno-db
    plan: free
    databaseName: xenocrm
